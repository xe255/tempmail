[build]
  publish = "public"
  functions = "netlify/functions"

[functions]
  included_files = ["emailpass.txt", "davidpass.txt"]

[[redirects]]
  from = "/da"
  to = "/index.html"
  status = 200
  force = true

# :splat is required so Express sees the full path (e.g. /api/da/bootstrap), not only /api
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/admin/login"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/admin/logout"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/admin/api/*"
  to = "/.netlify/functions/api"
  status = 200
